# HTTP-only reverse proxy to the Node app (no domain / SSL).
# When you later add a domain + Let's Encrypt, replace this with the
# HTTP->HTTPS redirect + 443 server block from the deployment guide.
server {
    listen 80;
    server_name _;   # matches the server IP / any host

    client_max_body_size 50M;

    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }
}
